version: '3.8'
services:
  client:
    container_name: love-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - server
    networks:
      - app-network

  server:
    container_name: love-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT}:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - SITE_TITLE=${SITE_TITLE}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - UPLOAD_PATH=/app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  database:
    container_name: love-db
    image: postgres:16-alpine
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  pg_data:
  uploads:

networks:
  app-network:
    driver: bridge
